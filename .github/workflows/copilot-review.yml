name: Copilot Code Review

on:
  pull_request:
    branches: [develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/copilot-code-review-action@v1
        with:
          model: gpt-4o
